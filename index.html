<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Portfolio</title>
  </head>
  <body class="page">
    <header>
      <h2 class="brand">Welcome</h2>
      <nav>
        <ul>
          <li><a href="#portfolio">Portfolio</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
      <button class="nav-toggler" type="button">
        <img src="./img/Enabled.svg" alt="" />
      </button>
    </header>
    <main>
      <div id="hero">
        <div class="hero-content">
          <h1>Hey there! I'm Duncan.</h1>
          <h2>I'm a software developer.</h2>
          <p>
            I can help build a product, feature or website. Look through some of
            my work and experience! If you like what you see and have a project
            you need coded, don't hesitate to contact me.
          </p>
          <div class="social-icons">
            <img src="./img/twitter.svg" alt="twitter icon" />
            <img src="./img/Linkedin.svg" alt="linkedin icon" />
            <img src="./img/medium.svg" alt="medium icon" />
            <img src="./img/github.svg" alt="github icon" />
            <img src="./img/angellist.svg" alt="angellist icon" />
          </div>
        </div>
        <button class="scroll-down" type="button">
          <img src="./img/Disabled.svg" alt="twitter icon" />
        </button>
      </div>
    </main>

    <script src="https://kit.fontawesome.com/0879019638.js"></script>
  </body>
</html>
